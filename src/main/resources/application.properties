spring.application.name=SEAL-Hackathon-BE

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.packages-to-scan=com.fpt.swp.sealhackathonbe
springdoc.swagger-ui.operationsSorter=alpha

# Database Configuration
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=SWP_SEAL_HackathonDB;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=12345
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
