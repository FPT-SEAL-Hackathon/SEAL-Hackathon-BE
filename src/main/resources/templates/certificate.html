<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        @page {
            size: A4 landscape;
            margin: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #fdfbf7;
            margin: 0;
            padding: 50px;
            text-align: center;
            border: 20px solid #d4af37;
            height: 85%;
        }

        .title {
            font-size: 42px;
            color: #1a365d;
            margin-top: 50px;
            font-weight: bold;
        }

        .subtitle {
            font-size: 20px;
            color: #4a5568;
            font-style: italic;
        }

        .team-name {
            font-size: 36px;
            color: #d4af37;
            margin: 30px 0;
            font-weight: bold;
        }

        .award-title {
            font-size: 24px;
            color: #2d3748;
            margin-bottom: 50px;
        }

        .event-name {
            font-size: 18px;
            color: #718096;
        }

        .footer {
            margin-top: 100px;
            font-size: 14px;
            color: #718096;
        }
    </style>
</head>
<body>
<div class="title">Certificate</div>
<div class="subtitle">The contest organizers are proudly presenting this to the team:</div>

<div class="team-name" th:text="${teamName}">Tên Đội Thi</div>
<div class="award-title" th:text="${'Has excellently won the award: ' + awardTitle}">Tên Giải Thưởng</div>

<div class="event-name" th:text="${'Event: ' + eventName}">Tên Sự Kiện</div>

<div class="footer">
    <span th:text="${'Certificate ID: ' + certCode}">Mã số: CERT-001</span> |
    <span th:text="${'Issued Date: ' + issuedDate}">Ngày cấp</span>
</div>
</body>
</html>
