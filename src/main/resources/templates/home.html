<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEAL Dashboard - Home</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        orange: {
                            50: '#fff7ed',
                            100: '#ffedd5',
                            500: '#f97316',
                            600: '#ea580c',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Tùy chỉnh thanh cuộn cho đẹp hơn */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="font-sans antialiased text-gray-800 bg-gradient-to-br from-[#fdfbf7] via-[#fff4eb] to-[#e6f4ea] min-h-screen flex overflow-hidden">

<aside class="w-64 hidden md:flex flex-col bg-white/70 backdrop-blur-xl border-r border-white/60 h-screen shadow-sm relative z-20">

    <div class="h-20 flex items-center px-8 border-b border-gray-100/50">
        <div class="w-8 h-8 rounded-lg bg-orange-500 text-white flex items-center justify-center font-bold shadow-md mr-3">
            <i class="fa-solid fa-code"></i>
        </div>
        <span class="font-bold text-xl tracking-tight text-gray-900">SEAL</span>
    </div>

    <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
        <p class="px-4 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Main Menu</p>

        <a href="#" class="flex items-center gap-3 px-4 py-3 bg-orange-50 text-orange-600 rounded-xl font-medium transition-colors">
            <i class="fa-solid fa-house w-5"></i> Dashboard
        </a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-white/50 hover:text-gray-900 rounded-xl font-medium transition-colors">
            <i class="fa-solid fa-users w-5"></i> My Team
        </a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-white/50 hover:text-gray-900 rounded-xl font-medium transition-colors">
            <i class="fa-solid fa-cloud-arrow-up w-5"></i> Submissions
        </a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-white/50 hover:text-gray-900 rounded-xl font-medium transition-colors">
            <i class="fa-solid fa-chart-simple w-5"></i> Leaderboard
        </a>

        <p class="px-4 text-xs font-semibold text-gray-400 uppercase tracking-wider mt-6 mb-2">Preferences</p>

        <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-white/50 hover:text-gray-900 rounded-xl font-medium transition-colors">
            <i class="fa-solid fa-gear w-5"></i> Settings
        </a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-white/50 hover:text-gray-900 rounded-xl font-medium transition-colors">
            <i class="fa-regular fa-circle-question w-5"></i> Help Center
        </a>
    </nav>

    <div class="p-4 border-t border-gray-100/50">
        <div class="flex items-center gap-3 px-4 py-2 hover:bg-white/50 rounded-xl cursor-pointer transition-colors">
            <img src="https://ui-avatars.com/api/?name=Alex+Johnson&background=f97316&color=fff&rounded=true" alt="User Avatar" class="w-9 h-9 rounded-full shadow-sm">
            <div class="flex-1 min-w-0">
                <p class="text-sm font-medium text-gray-900 truncate">Alex Johnson</p>
                <p class="text-xs text-gray-500 truncate">Team Leader</p>
            </div>
            <i class="fa-solid fa-right-from-bracket text-gray-400 hover:text-red-500"></i>
        </div>
    </div>
</aside>

<main class="flex-1 flex flex-col h-screen overflow-hidden relative z-10">

    <header class="h-20 bg-white/40 backdrop-blur-md border-b border-white/50 flex items-center justify-between px-6 lg:px-10 z-20">
        <button class="md:hidden text-gray-500 hover:text-gray-900">
            <i class="fa-solid fa-bars text-xl"></i>
        </button>

        <div class="hidden sm:flex items-center bg-white/60 border border-white rounded-full px-4 py-2 w-96 shadow-sm focus-within:ring-2 focus-within:ring-orange-500/20 focus-within:border-orange-500 transition-all">
            <i class="fa-solid fa-magnifying-glass text-gray-400 mr-2"></i>
            <input type="text" placeholder="Search projects, teams, or members..." class="bg-transparent border-none outline-none text-sm w-full text-gray-700 placeholder-gray-400">
        </div>

        <div class="flex items-center gap-4 lg:gap-6">
            <button class="relative text-gray-500 hover:text-gray-900 transition-colors">
                <i class="fa-regular fa-bell text-xl"></i>
                <span class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span>
            </button>
            <button class="bg-gradient-to-r from-orange-500 to-orange-600 text-white px-5 py-2 rounded-full text-sm font-medium shadow-md shadow-orange-500/20 hover:shadow-lg hover:-translate-y-0.5 transition-all">
                + New Submission
            </button>
        </div>
    </header>

    <div class="flex-1 overflow-y-auto p-6 lg:p-10">

        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Dashboard</h1>
            <p class="text-gray-500 mt-1">Here's what's happening with your hackathon projects today.</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="bg-white/70 backdrop-blur-md rounded-2xl p-6 shadow-sm border border-white/60 hover:shadow-md transition-shadow">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm font-medium text-gray-500 mb-1">Current Rank</p>
                        <h3 class="text-2xl font-bold text-gray-900">#12 <span class="text-sm font-normal text-green-500 ml-1"><i class="fa-solid fa-arrow-trend-up"></i> 3</span></h3>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-orange-100 flex items-center justify-center text-orange-500">
                        <i class="fa-solid fa-medal"></i>
                    </div>
                </div>
            </div>

            <div class="bg-white/70 backdrop-blur-md rounded-2xl p-6 shadow-sm border border-white/60 hover:shadow-md transition-shadow">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm font-medium text-gray-500 mb-1">Total Score</p>
                        <h3 class="text-2xl font-bold text-gray-900">85<span class="text-sm font-normal text-gray-400">/100</span></h3>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-500">
                        <i class="fa-solid fa-star"></i>
                    </div>
                </div>
            </div>

            <div class="bg-white/70 backdrop-blur-md rounded-2xl p-6 shadow-sm border border-white/60 hover:shadow-md transition-shadow">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm font-medium text-gray-500 mb-1">Days Remaining</p>
                        <h3 class="text-2xl font-bold text-gray-900">03
